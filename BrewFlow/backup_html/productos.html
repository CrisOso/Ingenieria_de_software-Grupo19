<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrewFlow - Productos perecibles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <main id="main" class="lg:ml-72 p-6">
    <div id="mensaje" class="hidden"></div>
    <section class="bg-gray-800 rounded-lg border border-gray-700 p-5 mb-6"><h3 class="font-semibold text-lg mb-4">Registrar producto perecible</h3><form id="form" class="grid gap-4 md:grid-cols-3"><input name="codigo" required placeholder="Código único" class="bg-gray-700 rounded p-2 border border-gray-600"><input name="nombre" required placeholder="Nombre producto" class="bg-gray-700 rounded p-2 border border-gray-600"><input name="categoria" required placeholder="Categoría" class="bg-gray-700 rounded p-2 border border-gray-600"><select name="unidad_medida_id" id="unidades" required class="bg-gray-700 rounded p-2 border border-gray-600"></select><select name="estado" class="bg-gray-700 rounded p-2 border border-gray-600"><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select><input name="precio" type="number" min="0" step="1" value="0" placeholder="Precio referencial" class="bg-gray-700 rounded p-2 border border-gray-600"><button class="md:col-span-3 bg-amber-500 text-gray-950 font-semibold rounded p-2">Registrar producto</button></form></section><section class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-900"><tr><th class="p-3 text-left">Código</th><th class="p-3 text-left">Producto</th><th class="p-3 text-left">Categoría</th><th class="p-3 text-left">Unidad</th><th class="p-3 text-left">Stock</th><th class="p-3 text-left">Estado</th></tr></thead><tbody id="tabla"></tbody></table></div></section>
  </main>
  <script src="app-common.js"></script>
  <script>
    montarLayout('Productos perecibles', 'UR 3.1: código único, nombre, categoría, unidad y estado activo/inactivo.');
    
async function cargarUnidades(){ const data=await api('/api/unidades',{headers:authHeaders}); document.getElementById('unidades').innerHTML=data.filter(u=>u.unidad_medida_estado==='activo').map(u=>`<option value="${u.unidad_medida_id}">${u.unidad_medida_nombre} (${u.unidad_medida_codigo})</option>`).join(''); }
async function cargar(){ const data=await api('/api/productos',{headers:authHeaders}); document.getElementById('tabla').innerHTML=data.map(p=>`<tr class="border-t border-gray-700"><td class="p-3">${p.producto_codigo}</td><td class="p-3 font-medium">${p.producto_nombre}</td><td class="p-3">${p.producto_categoria}</td><td class="p-3">${p.unidad_medida_codigo}</td><td class="p-3">${formatoNumero(p.producto_stock_actual)}</td><td class="p-3">${p.producto_estado}</td></tr>`).join(''); }
document.getElementById('form').addEventListener('submit',async e=>{ e.preventDefault(); const body=Object.fromEntries(new FormData(e.target).entries()); body.unidad_medida_id=Number(body.unidad_medida_id); body.precio=Number(body.precio||0); try{ await api('/api/productos',{method:'POST',headers:jsonHeaders,body:JSON.stringify(body)}); setMensaje('mensaje','Producto registrado correctamente'); e.target.reset(); await cargar(); }catch(err){setMensaje('mensaje',err.message,false);} });
Promise.all([cargarUnidades(),cargar()]).catch(e=>setMensaje('mensaje',e.message,false));

  </script>
</body>
</html>
