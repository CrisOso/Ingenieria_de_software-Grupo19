<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BrewFlow - Salidas de stock</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <main id="main" class="lg:ml-72 p-6"><div id="mensaje" class="hidden"></div><section class="bg-gray-800 rounded-lg border border-gray-700 p-5 mb-6"><h3 class="font-semibold text-lg mb-4">Registrar salida de stock</h3><form id="form" class="grid gap-4 md:grid-cols-3"><select name="producto_id" id="productos" required class="bg-gray-700 rounded p-2 border border-gray-600"></select><select name="lote_id" id="lotes" required class="bg-gray-700 rounded p-2 border border-gray-600"></select><input name="cantidad" type="number" min="0.01" step="0.01" required placeholder="Cantidad" class="bg-gray-700 rounded p-2 border border-gray-600"><select name="motivo" required class="bg-gray-700 rounded p-2 border border-gray-600"><option value="venta">Venta</option><option value="consumo_interno">Consumo interno</option><option value="merma">Merma</option><option value="descarte">Descarte</option><option value="ajuste">Ajuste</option></select><input name="fecha" type="datetime-local" class="bg-gray-700 rounded p-2 border border-gray-600"><input name="observacion" placeholder="Observación" class="bg-gray-700 rounded p-2 border border-gray-600"><button class="md:col-span-3 bg-amber-500 text-gray-950 font-semibold rounded p-2">Registrar salida</button></form></section><section class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden"><div class="p-4 border-b border-gray-700"><h3 class="font-semibold">Lotes disponibles del producto seleccionado</h3></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-900"><tr><th class="p-3 text-left">Lote</th><th class="p-3 text-left">Producto</th><th class="p-3 text-left">Proveedor</th><th class="p-3 text-left">Disponible</th><th class="p-3 text-left">Vencimiento</th></tr></thead><tbody id="tabla"></tbody></table></div></section></main>
  <script src="app-common.js"></script>
  <script>montarLayout('Salidas de stock', 'UR 4.3: venta, consumo interno, merma o descarte.');
let todosLotes=[];
async function cargarProductos(){ const productos=await api('/api/productos',{headers:authHeaders}); document.getElementById('productos').innerHTML=productos.filter(p=>p.producto_estado==='activo').map(p=>`<option value="${p.producto_id}">${p.producto_codigo} - ${p.producto_nombre}</option>`).join(''); await cargarLotes(); }
async function cargarLotes(){ const pid=document.getElementById('productos').value; todosLotes=await api(`/api/lotes?producto_id=${pid}`,{headers:authHeaders}); const disponibles=todosLotes.filter(l=>Number(l.lote_cantidad_disponible)>0); document.getElementById('lotes').innerHTML=disponibles.map(l=>`<option value="${l.lote_id}">${l.lote_codigo} · disp. ${formatoNumero(l.lote_cantidad_disponible)} ${l.unidad_medida_codigo||''}</option>`).join(''); document.getElementById('tabla').innerHTML=disponibles.map(l=>`<tr class="border-t border-gray-700"><td class="p-3">${l.lote_codigo}</td><td class="p-3">${l.producto_nombre}</td><td class="p-3">${l.proveedor_nombre||'-'}</td><td class="p-3">${formatoNumero(l.lote_cantidad_disponible)} ${l.unidad_medida_codigo||''}</td><td class="p-3">${formatoFecha(l.lote_fecha_vencimiento)}</td></tr>`).join('') || '<tr><td class="p-3 text-gray-400" colspan="5">No existen lotes disponibles</td></tr>'; }
document.getElementById('productos').addEventListener('change',cargarLotes);
document.getElementById('form').addEventListener('submit',async e=>{ e.preventDefault(); const body=Object.fromEntries(new FormData(e.target).entries()); body.producto_id=Number(body.producto_id); body.lote_id=Number(body.lote_id); body.cantidad=Number(body.cantidad); if(!body.fecha) delete body.fecha; try{ await api('/api/movimientos/salidas',{method:'POST',headers:jsonHeaders,body:JSON.stringify(body)}); setMensaje('mensaje','Salida registrada y stock descontado'); e.target.reset(); await cargarLotes(); }catch(err){setMensaje('mensaje',err.message,false);} });
cargarProductos().catch(e=>setMensaje('mensaje',e.message,false));
</script>
</body></html>
